$defs:
  addons:
    additionalProperties: false
    properties:
      defstatus:
        type: string
      events:
        items:
          type: str
        type: array
      inlimits:
        oneOf:
          - type: array
            prefixItems:
              type: string
            minItems: 1
            maxItems: 1
          - type: array
            prefixItems:
              type: string
              type: string
            minItems: 2
            maxItems: 2
          - type: array
            prefixItems:
              type: string
              type: string
              type: integer
            minItems: 3
            maxItems: 3
          - type: array
            prefixItems:
              type: string
              type: string
              type: integer
              type: boolean
            minItems: 4
            maxItems: 4
      labels:
        type: array
        items:
          type: array
          items:
            type: string
          minItems: 2
          maxItems: 2
      late:


  expander:
    additionalProperties: false
    minProperties: 2
    patternProperties:
      "^families_.+$":
        "$ref": "#/$defs/expander"
      "^family_.+$":
        "$ref": "#/$defs/family"
      "^task_.+$":
        "$ref": "#/$defs/task"
      "^tasks_.+$":
        "$ref": "#/$defs/expander"
    properties:
      expand:
        additionalProperties: false
        minProperties: 1
        patternProperties:
          "^.+$":
            type: array
        type: object
    required:
      - expand
    anyOf:
      - required: ["^families_.+$"]
      - required: ["^family_.+$"]
      - required: ["^task_.+$"]
      - required: ["^tasks_.+$"]
    type: object

  nodeContainer:
    additionalProperties: false
    patternProperties:
      "^families_.+$":
        "$ref": "#/$defs/expander"
      "^family_.+$":
        "$ref": "#/$defs/family"
      "^task_.+$":
        "$ref": "#/$defs/task"
      "^tasks_.+$":
        "$ref": "#/$defs/expander"
    type: object


properties:
  ecflow:
    additionalProperties: false
    properties:
      extern:
        items:
          type: string
        type: array
      scheduler:
        type: string
      "^suite_.+$":
        "$ref": "#/$defs/suite"
        type: object
      "^suites_.+$":
        "$ref": "#/$defs/expander"
      vars:
        type: object


