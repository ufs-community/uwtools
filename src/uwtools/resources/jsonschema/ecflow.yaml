$defs:
  addons:
    additionalProperties: false
    properties:
      defstatus:
        type: string
      events:
        items:
          type: str
        type: array
      inlimits:
        type: array:
        items:
          oneOf:
            - type: array
              prefixItems:
                type: string
              minItems: 1
              maxItems: 1
            - type: array
              prefixItems:
                type: string
                type: string
              minItems: 2
              maxItems: 2
            - type: array
              prefixItems:
                type: string
                type: string
                type: integer
              minItems: 3
              maxItems: 3
            - type: array
              prefixItems:
                type: string
                type: string
                type: integer
                type: boolean
              minItems: 4
              maxItems: 4
      labels:
        type: array
        items:
          type: array
          items:
            type: string
          minItems: 2
          maxItems: 2
      late:
        additionalProperties: false
        properties:
          submitted:
            type: str
          active:
            type: str
          complete:
            type: str
        type: object
      limits:
        type: array
        prefixItems:
          type: string
          type: array
        minItems: 2
        maxItems: 2
      meters:
        type: array
        items:
          anyOf:
            - type: array
              prefixItems:
                type: string
                type: integer
                type: integer
              minItems: 3
              maxItems: 3
            - type: array
              prefixItems:
                type: string
                type: integer
                type: integer
                type: integer
              minItems: 4
              maxItems: 4
      repeat:
        type: object
      trigger:
        type: string
      vars:
        type: object
  expander:
    additionalProperties: false
    minProperties: 2
    patternProperties:
      "^families_.+$":
        "$ref": "#/$defs/expander"
      "^family_.+$":
        "$ref": "#/$defs/family"
      "^task_.+$":
        "$ref": "#/$defs/task"
      "^tasks_.+$":
        "$ref": "#/$defs/expander"
    properties:
      expand:
        additionalProperties: false
        minProperties: 1
        patternProperties:
          "^.+$":
            type: array
        type: object
    required:
      - expand
    anyOf:
      - patternProperties:
          "^families_.+$": {}
        properties: {}
        minProperties: 1
      - patternProperties:
          "^family_.+$": {}
        properties: {}
        minProperties: 1
      - patternProperties:
          "^task_.+$": {}
        properties: {}
        minProperties: 1
      - patternProperties:
          "^tasks_.+$": {}
        properties: {}
        minProperties: 1
    type: object

  family:
    additionalProperties: false
    allOf:
      - "$ref": "#/$defs/nodeContainer"
      - "$ref": "#/$defs/addons"
  nodeContainer:
    additionalProperties: false
    patternProperties:
      "^families_.+$":
        "$ref": "#/$defs/expander"
      "^family_.+$":
        "$ref": "#/$defs/family"
      "^task_.+$":
        "$ref": "#/$defs/task"
      "^tasks_.+$":
        "$ref": "#/$defs/expander"
    type: object
  task:
    additionalProperties: false
    allOf:
      - "$ref": "#/$defs/addons"
      - properties:
          script:
            additionalProperties: false
            properties:
              account:
                type: string
              execution:
                oneOf:
                  - "$ref": urn:uwtools:execution
                  - "$ref": urn:uwtools:execution-parallel
              rundir:
                type: string
              manual:
                type: string
              pre_includes:
                items:
                  type: string
                type: array
              post_includes:
                items:
                  type: string
                type: array
            required:
              - execution
            type: object
        required:
          - script
        type: object
properties:
  ecflow:
    additionalProperties: false
    patternProperties:
      "^suite_.+$":
        allOf:
          - "$ref": "#/$defs/nodeContainer"
          - "$ref": "#/$defs/addons"
      "^suites_.+$":
        "$ref": "#/$defs/expander"
    properties:
      extern:
        items:
          type: string
        type: array
      scheduler:
        enum:
          - lsf
          - pbs
          - slurm
        type: string
      vars:
        type: object
    anyOf:
      - patternProperties:
          "^suite_.+$": {}
        properties: {}
        minProperties: 1
      - patternProperties:
          "^suites_.+$": {}
        properties: {}
        minProperties: 1
    type: object
required:
  - ecflow
type: object

